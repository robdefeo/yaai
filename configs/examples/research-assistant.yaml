workflow:
  type: single
  steps: []

agents:
  - id: researcher
    provider: anthropic
    model: claude-haiku-4-5
    tools: [web_search]
    max_steps: 8
    system_prompt: |
      You are a research assistant. When given a question, use the web_search tool
      to find relevant information, then synthesise a clear, concise answer.
      When you have enough information, provide your final answer directly without
      calling any more tools.
